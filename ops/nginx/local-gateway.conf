server {
  listen 80;
  server_name _;

  # Trading WebSocket
  location /api/trading/ws/ {
    proxy_pass http://report_orchestrator:8000/api/trading/ws/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  # Generic WebSocket routes
  location /ws/ {
    proxy_pass http://report_orchestrator:8000/ws/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  # Auth service
  location /api/auth/ {
    proxy_pass http://auth_service:8007/api/auth/;
    proxy_set_header Host $host;
  }

  # LLM Gateway API
  location /api/llm/ {
    proxy_pass http://llm_gateway:8003/;
    proxy_set_header Host $host;
  }

  # Default API -> report_orchestrator
  location /api/ {
    proxy_pass http://report_orchestrator:8000/api/;
    proxy_set_header Host $host;
  }

  # Local gateway is API/WebSocket focused in dev.
  location / {
    return 404;
  }
}
