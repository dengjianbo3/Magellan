server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Trading WebSocket (FastAPI)
  location /api/trading/ws/ {
    proxy_pass http://report_orchestrator:8000/api/trading/ws/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  # Auth service
  location /api/auth/ {
    proxy_pass http://auth_service:8007/api/auth/;
    proxy_set_header Host $host;
  }

  # Default API -> report_orchestrator
  location /api/ {
    proxy_pass http://report_orchestrator:8000/api/;
    proxy_set_header Host $host;
  }

  # LLM Gateway API
  location /api/llm/ {
    proxy_pass http://llm_gateway:8003/;
    proxy_set_header Host $host;
  }

  # SPA history fallback
  location / {
    try_files $uri $uri/ /index.html;
  }
}
